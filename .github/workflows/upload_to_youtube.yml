# ==============================================================================
# upload_to_youtube.yml – version 20.0 (WARP restored, exit crash fixed)
# ==============================================================================
name: Upload to YouTube (incomplete)
on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'GitHub Issue number (default 3)'
        required: false
        type: string
        default: '3'
      start_url:
        description: 'Starting URL (default: https://studio.youtube.com)'
        required: false
        type: string
        default: 'https://studio.youtube.com'

jobs:
  control:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    env:
      KEY: ${{ secrets.KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PYTHONUNBUFFERED: 1

    steps:
      - uses: actions/checkout@v4

      - name: "1) Clean screenshots & log"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -rf screenshots upload_to_youtube.log
          mkdir -p screenshots
          git add -A && git commit -m "Clean start" || echo "Nothing to commit"
          git pull --rebase && git push || echo "Push failed, continuing"

      - name: "Setup Cloudflare WARP"
        uses: viperadnan-git/setup-warp@v1
        with:
          mode: 'client'
          stack: 'dual'
          configure_docker: 'false'

      - name: "Verify WARP connection"
        run: |
          curl -s https://www.cloudflare.com/cdn-cgi/trace | grep -E "warp|ip|loc"
          echo "WARP is active"

      - name: "2) Restore cached Chrome profile"
        uses: actions/cache/restore@v3
        id: cache
        with:
          path: profile_cache.tar.enc
          key: chrome-profile-v1

      - name: "3) Install dependencies"
        run: |
          sudo apt update && sudo apt install -y wget gnupg python3-pip ffmpeg xvfb
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt update && sudo apt install -y google-chrome-stable
          pip3 install selenium webdriver-manager requests cryptography pyvirtualdisplay Pillow

      - name: "4) Clear all comments from issue"
        run: |
          ISSUE_NUMBER="${{ github.event.inputs.issue_number }}"
          for comment_id in $(gh api repos/$GITHUB_REPOSITORY/issues/$ISSUE_NUMBER/comments --jq '.[].id'); do
            gh api repos/$GITHUB_REPOSITORY/issues/comments/$comment_id -X DELETE
          done
          echo "Issue #$ISSUE_NUMBER comments cleared."

      - name: "5) Start remote‑control (ActionBuilder absolute coords)"
        timeout-minutes: 360
        run: |
          python3 << 'PYEOF'
          import os, time, subprocess, hashlib, sys, base64, shutil, tarfile, io, glob, re, json
          from datetime import datetime
          from pyvirtualdisplay import Display
          from cryptography.fernet import Fernet
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.common.keys import Keys
          from selenium.webdriver.common.action_chains import ActionChains
          from selenium.webdriver.common.actions.action_builder import ActionBuilder
          from selenium.webdriver.chrome.options import Options
          from PIL import Image, ImageDraw

          # ---------- logging ----------
          LOG_FILENAME = "upload_to_youtube.log"
          logfile = open(LOG_FILENAME, "a", encoding="utf-8")
          log_closed = False

          def echo(msg):
              if not log_closed:
                  logfile.write(msg + "\n")
                  logfile.flush()
              print(msg, flush=True)

          def log(msg):
              now = datetime.now().strftime("%H:%M:%S")
              echo(f"[{now}] {msg}")

          echo(f"============================================================\n"
               f"  Remote Control (ActionBuilder) started at {datetime.now().strftime('%Y-%m-%d %H:%M:%S UTC')}\n"
               f"  Version: 20.0\n"
               f"============================================================\n")

          os.makedirs("screenshots", exist_ok=True)

          PROFILE_DIR = "/tmp/chrome_profile"
          if os.path.exists("profile_cache.tar.enc"):
              KEY = os.environ["KEY"]
              ENCRYPTION_KEY = base64.urlsafe_b64encode(hashlib.sha256(KEY.encode()).digest())
              def decrypt_data(data):
                  return Fernet(ENCRYPTION_KEY).decrypt(data)
              with open("profile_cache.tar.enc","rb") as f:
                  encrypted = f.read()
              decrypted = decrypt_data(encrypted)
              shutil.rmtree(PROFILE_DIR, ignore_errors=True)
              buf = io.BytesIO(decrypted)
              with tarfile.open(fileobj=buf, mode='r:gz') as tar:
                  tar.extractall('/tmp')
              log("Profile restored.")
          else:
              log("No cached profile found – starting without login data.")

          display = Display(visible=False, size=(1920,1080))
          display.start()

          opts = Options()
          opts.add_argument("--no-sandbox")
          opts.add_argument("--disable-gpu")
          opts.add_argument("--disable-blink-features=AutomationControlled")
          opts.add_argument("--window-size=1920,1080")
          if os.path.exists(PROFILE_DIR):
              opts.add_argument(f"--user-data-dir={PROFILE_DIR}")
              opts.add_argument("--profile-directory=Default")
          opts.add_experimental_option("excludeSwitches", ["enable-automation"])
          opts.add_experimental_option('useAutomationExtension', False)

          driver = webdriver.Chrome(options=opts)
          log("Browser launched.")

          W, H = 1920, 1080
          cursor_x, cursor_y = W//2, H//2

          counter = [0]
          def ss(desc="screenshot", push=True):
              counter[0] += 1
              now = datetime.now().strftime("%H%M%S")
              fname = f"screenshots/{counter[0]:03d}_{now}_{desc}.png"
              driver.save_screenshot(fname)
              try:
                  img = Image.open(fname)
                  draw = ImageDraw.Draw(img)
                  x, y = cursor_x, cursor_y
                  r = 12
                  draw.ellipse([(x - r, y - r), (x + r, y + r)], outline='red', width=3)
                  draw.line([(x - 15, y), (x + 15, y)], fill='red', width=3)
                  draw.line([(x, y - 15), (x, y + 15)], fill='red', width=3)
                  img.save(fname)
                  echo(f"📸 {fname} (cursor at {x},{y})")
              except Exception as e:
                  echo(f"📸 {fname} (drawing error: {e})")
              if not push:
                  return fname
              subprocess.run(["git","stash","--include-untracked"],capture_output=True)
              try: subprocess.run(["git","pull","--rebase"],check=True,capture_output=True)
              except: pass
              subprocess.run(["git","stash","pop"],capture_output=True)
              subprocess.run(["git","add",fname,LOG_FILENAME],check=True)
              try: subprocess.run(["git","diff","--cached","--quiet"],check=True)
              except subprocess.CalledProcessError:
                  subprocess.run(["git","commit","-m",f"Screenshot {fname}"],check=True)
                  try: subprocess.run(["git","push"],check=True); echo("   ↳ pushed")
                  except: echo("   ↳ push failed, retry later")
              return fname

          ISSUE_NUMBER = "${{ github.event.inputs.issue_number }}".strip() or "3"
          START_URL = "${{ github.event.inputs.start_url }}" or "https://studio.youtube.com"
          repo = os.environ['GITHUB_REPOSITORY']
          def gh_api(*args, **kwargs):
              cmd = ['gh','api'] + list(args)
              res = subprocess.run(cmd, capture_output=True, text=True, check=True, **kwargs)
              return res.stdout.strip()
          def issue_comment(markdown_body):
              return gh_api(f'repos/{repo}/issues/{ISSUE_NUMBER}/comments',
                            '--method','POST', '-f',f'body={markdown_body}',
                            '--jq', '.id')

          # ----- ABSOLUTE VIEWPORT MOVEMENT via ActionBuilder -----
          def move_cursor_absolute(x, y):
              global cursor_x, cursor_y
              x = max(0, min(W-1, x))
              y = max(0, min(H-1, y))
              action = ActionBuilder(driver)
              action.pointer_action.move_to_location(x, y)
              action.perform()
              cursor_x, cursor_y = x, y

          def click_at_current():
              ActionChains(driver).click().perform()

          # ----- Navigate to start URL -----
          driver.get(START_URL)
          time.sleep(5)
          driver.execute_script("window.scrollTo(0,0);")
          first_ss = ss("01_start_page", push=True)
          last_agent_id = issue_comment(
              f"Remote ready at {START_URL}. Cursor at ({cursor_x},{cursor_y}). Max viewport {W}x{H}. "
              "Commands:\n"
              "`(x, y)` – move cursor to absolute viewport position\n"
              "`shoot` – click at current position\n"
              "`type:hello` – type text\n"
              "`Ctrl + A` – key combination\n"
              "`exit` – stop"
          )
          log("Initial comment posted. Waiting for commands...")

          while True:
              new_id = None
              while True:
                  try:
                      new_id = gh_api(f'repos/{repo}/issues/{ISSUE_NUMBER}/comments',
                                      '--jq', '.[-1].id // ""')
                  except:
                      time.sleep(10)
                      continue
                  if new_id and new_id != last_agent_id:
                      break
                  time.sleep(10)

              raw_cmd = gh_api(f'repos/{repo}/issues/comments/{new_id}', '--jq', '.body').strip()
              log(f"📥 Command: {raw_cmd}")

              if raw_cmd.lower() == "exit":
                  issue_comment("Exiting as requested. Goodbye!")
                  log("Exit command received.")
                  break

              result = ""
              m1 = re.match(r'^\(\s*(\d+)\s*,\s*(\d+)\s*\)$', raw_cmd)
              m2 = raw_cmd.strip().lower() == "shoot"
              m3 = re.match(r'^type:(.+)', raw_cmd, re.IGNORECASE)
              is_combo = '+' in raw_cmd and not m1

              try:
                  if m1:
                      x = int(m1.group(1))
                      y = int(m1.group(2))
                      move_cursor_absolute(x, y)
                      result = f"Moved cursor to viewport ({cursor_x},{cursor_y})."
                  elif m2:
                      click_at_current()
                      result = f"Clicked at viewport ({cursor_x},{cursor_y})."
                  elif m3:
                      text = m3.group(1)
                      ActionChains(driver).send_keys(text).perform()
                      result = f"Typed '{text}'."
                  elif is_combo:
                      parts = [p.strip() for p in raw_cmd.split('+')]
                      if len(parts) >= 2:
                          mods = parts[:-1]
                          main = parts[-1]
                          actions = ActionChains(driver)
                          for mod in mods:
                              if hasattr(Keys, mod):
                                  actions = actions.key_down(getattr(Keys, mod))
                              else:
                                  actions = actions.key_down(mod)
                          if hasattr(Keys, main):
                              actions = actions.send_keys(getattr(Keys, main))
                          else:
                              actions = actions.send_keys(main)
                          for mod in reversed(mods):
                              if hasattr(Keys, mod):
                                  actions = actions.key_up(getattr(Keys, mod))
                              else:
                                  actions = actions.key_up(mod)
                          actions.perform()
                          result = f"Pressed combo '{raw_cmd}'."
                      else:
                          ActionChains(driver).send_keys(raw_cmd).perform()
                          result = f"Sent keys '{raw_cmd}'."
                  else:
                      if hasattr(Keys, raw_cmd):
                          ActionChains(driver).send_keys(getattr(Keys, raw_cmd)).perform()
                      else:
                          ActionChains(driver).send_keys(raw_cmd).perform()
                      result = f"Pressed '{raw_cmd}'."

                  time.sleep(1)
                  fname = ss("after_action", push=True)
                  comment = f"{result}\nCursor now at ({cursor_x},{cursor_y}), max ({W},{H})."
                  if fname:
                      comment += f" Screenshot: {fname}"
                  last_agent_id = issue_comment(comment)

              except Exception as e:
                  log(f"Error: {e}")
                  last_agent_id = issue_comment(f"Error: {e}")

          driver.quit()
          display.stop()
          log("Browser closed.")

          # ---------- close log safely ----------
          log_closed = True
          logfile.close()
          echo("\n🎉 Remote control session ended. (log file closed)")
          PYEOF
