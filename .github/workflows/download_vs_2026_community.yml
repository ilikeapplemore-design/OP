name: Download VS 2026 Community Offline Mode

on:
  workflow_dispatch:
    inputs:
      cache_mode:
        description: 'Cache behavior'
        type: choice
        options:
          - 'use cache if any'
          - 'do not use cache'
        default: 'do not use cache'
      layout_options:
        description: 'Additional VS layout options (--includeRecommended is default)'
        type: string
        default: '--includeRecommended'
      verify_layout:
        description: 'Test install layout offline? (takes extra time)'
        type: boolean
        default: true
      workload_web:
        description: 'ASP.NET and web development'
        type: boolean
        default: true
      workload_azure:
        description: 'Azure and AI development'
        type: boolean
        default: true
      workload_python:
        description: 'Python development'
        type: boolean
        default: true
      workload_node:
        description: 'Node.js development'
        type: boolean
        default: true
      workload_maui:
        description: '.NET Multi-platform App UI development'
        type: boolean
        default: true
      workload_desktop_net:
        description: '.NET desktop development'
        type: boolean
        default: true
      workload_desktop_cpp:
        description: 'Desktop development with C++'
        type: boolean
        default: true
      workload_winui:
        description: 'WinUI application development'
        type: boolean
        default: true
      workload_cpp_mobile:
        description: 'Mobile development with C++ (Out of support)'
        type: boolean
        default: true
      workload_unity:
        description: 'Game development with Unity'
        type: boolean
        default: true
      workload_cpp_game:
        description: 'Game development with C++'
        type: boolean
        default: true
      workload_data:
        description: 'Data storage and processing'
        type: boolean
        default: true
      workload_data_science:
        description: 'Data science and analytical applications'
        type: boolean
        default: true
      workload_office:
        description: 'Microsoft 365 development'
        type: boolean
        default: true
      workload_vs_extension:
        description: 'Visual Studio extension development'
        type: boolean
        default: true
      workload_linux_cpp:
        description: 'Linux, Mac, and embedded development with C++'
        type: boolean
        default: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: "Log initial free space (C: and D:)"
        shell: powershell
        run: |
          Get-PSDrive C, D | Select-Object Name, Free

      - name: Clean up old chunk folder
        shell: powershell
        run: |
          if (Test-Path vs_2026_community_offline) {
            Remove-Item -Recurse -Force vs_2026_community_offline
            Write-Host "Cleaned old chunk folder."
          } else {
            Write-Host "No old chunk folder found."
          }

      - name: Free disk space on runner
        shell: powershell
        run: |
          Remove-Item -Recurse -Force "C:\Program Files\Microsoft Visual Studio\2022" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\Microsoft Visual Studio\2019" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files (x86)\Microsoft Visual Studio\*" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\Android" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$env:LOCALAPPDATA\Android" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\Microsoft SDKs" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\Docker" -ErrorAction SilentlyContinue
          Get-ChildItem "C:\Program Files\dotnet\sdk" -Directory -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -notlike "8.0*" -and $_.Name -notlike "9.0*" -and $_.Name -notlike "10.0*" } |
            Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$env:TEMP\*" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Windows\Temp\*" -ErrorAction SilentlyContinue
          Write-Host "Free space after cleanup:"
          Get-PSDrive C, D | Select-Object Name, Free

      - name: Download VS bootstrapper
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://aka.ms/vs/18/stable/vs_community.exe" -OutFile vs_Community.exe
          if ((Get-Item vs_Community.exe).Length -lt 1000000) {
            Write-Error "Bootstrapper download failed"
            exit 1
          }
          Write-Host "Bootstrapper ready."

      - name: Compute cache key
        id: cache-key
        shell: pwsh
        run: |
          $key = "vs-layout-v6-" +
            "-web-${{ inputs.workload_web }}" +
            "-azure-${{ inputs.workload_azure }}" +
            "-python-${{ inputs.workload_python }}" +
            "-node-${{ inputs.workload_node }}" +
            "-maui-${{ inputs.workload_maui }}" +
            "-desktopnet-${{ inputs.workload_desktop_net }}" +
            "-desktopcpp-${{ inputs.workload_desktop_cpp }}" +
            "-winui-${{ inputs.workload_winui }}" +
            "-cppmobile-${{ inputs.workload_cpp_mobile }}" +
            "-unity-${{ inputs.workload_unity }}" +
            "-cppgame-${{ inputs.workload_cpp_game }}" +
            "-data-${{ inputs.workload_data }}" +
            "-datascience-${{ inputs.workload_data_science }}" +
            "-office-${{ inputs.workload_office }}" +
            "-vsext-${{ inputs.workload_vs_extension }}" +
            "-linuxcpp-${{ inputs.workload_linux_cpp }}" +
            "-options-${{ inputs.layout_options }}"
          "key=$key" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Select drive with most free space
        id: select-drive
        shell: pwsh
        run: |
          $drives = Get-PSDrive -Name C, D | Where-Object { $_.Free -gt 0 }
          $bestDrive = $drives | Sort-Object Free -Descending | Select-Object -First 1
          $layoutRoot = "$($bestDrive.Name):\vs_layout_workdir"
          Write-Host "Using drive $($bestDrive.Name) with $([math]::Round($bestDrive.Free/1GB,2)) GB free"
          "layout_root=$layoutRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Restore cached layout
        id: cache-restore
        if: inputs.cache_mode == 'use cache if any'
        uses: actions/cache/restore@v4
        with:
          path: ${{ steps.select-drive.outputs.layout_root }}
          key: ${{ steps.cache-key.outputs.key }}

      - name: Create offline layout
        id: layout
        if: inputs.cache_mode == 'do not use cache' || steps.cache-restore.outputs.cache-hit != 'true'
        shell: pwsh
        timeout-minutes: 300
        run: |
          $layoutDir = "${{ steps.select-drive.outputs.layout_root }}"
          New-Item -ItemType Directory -Force -Path $layoutDir | Out-Null

          $addArgs = @()
          if ('${{ inputs.workload_web }}' -eq 'true') { $addArgs += '--add'; $addArgs += 'Microsoft.VisualStudio.Workload.NetWeb' }
          if ('${{ inputs.workload_azure }}' -eq 'true') { $addArgs += '--add'; $addArgs += 'Microsoft.VisualStudio.Workload.Azure' }
          if ('${{ inputs.workload_python }}' -eq 'true') { $addArgs += '--add'; $addArgs += 'Microsoft.VisualStudio.Workload.Python' }
          if ('${{ inputs.workload_node }}' -eq 'true') { $addArgs += '--add'; $addArgs += 'Microsoft.VisualStudio.Workload.Node' }
          if ('${{ inputs.workload_maui }}' -eq 'true') { $addArgs += '--add'; $addArgs += 'Microsoft.VisualStudio.Workload.NetCrossPlat' }
          if ('${{ inputs.workload_desktop_net }}' -eq 'true') { $addArgs += '--add'; $addArgs += 'Microsoft.VisualStudio.Workload.ManagedDesktop' }
          if ('${{ inputs.workload_desktop_cpp }}' -eq 'true') { $addArgs += '--add'; $addArgs += 'Microsoft.VisualStudio.Workload.NativeDesktop' }
          if ('${{ inputs.workload_winui }}' -eq 'true') { $addArgs += '--add'; $addArgs += 'Microsoft.VisualStudio.Workload.Universal' }
          if ('${{ inputs.workload_cpp_mobile }}' -eq 'true') { $addArgs += '--add'; $addArgs += 'Microsoft.VisualStudio.Workload.NativeMobile' }
          if ('${{ inputs.workload_unity }}' -eq 'true') { $addArgs += '--add'; $addArgs += 'Microsoft.VisualStudio.Workload.ManagedGame' }
          if ('${{ inputs.workload_cpp_game }}' -eq 'true') { $addArgs += '--add'; $addArgs += 'Microsoft.VisualStudio.Workload.NativeGame' }
          if ('${{ inputs.workload_data }}' -eq 'true') { $addArgs += '--add'; $addArgs += 'Microsoft.VisualStudio.Workload.Data' }
          if ('${{ inputs.workload_data_science }}' -eq 'true') { $addArgs += '--add'; $addArgs += 'Microsoft.VisualStudio.Workload.DataScience' }
          if ('${{ inputs.workload_office }}' -eq 'true') { $addArgs += '--add'; $addArgs += 'Microsoft.VisualStudio.Workload.Office' }
          if ('${{ inputs.workload_vs_extension }}' -eq 'true') { $addArgs += '--add'; $addArgs += 'Microsoft.VisualStudio.Workload.VisualStudioExtension' }
          if ('${{ inputs.workload_linux_cpp }}' -eq 'true') { $addArgs += '--add'; $addArgs += 'Microsoft.VisualStudio.Workload.NativeCrossPlat' }

          if ($addArgs.Count -eq 0) {
            Write-Error "No workload selected – at least one workload must be chosen."
            exit 1
          }

          $layoutOptions = "${{ inputs.layout_options }}".Trim()
          Write-Host "Layout options: $layoutOptions"

          $cliArgs = @('--layout', $layoutDir, '--lang', 'en-US') + $addArgs
          if ($layoutOptions -ne '') {
            $cliArgs += $layoutOptions -split ' '
          }
          $cliArgs += @('--quiet', '--wait', '--norestart')

          Write-Host "Arguments: $cliArgs"
          $process = Start-Process -FilePath .\vs_Community.exe -ArgumentList $cliArgs -PassThru -Wait -NoNewWindow `
            -RedirectStandardOutput "$env:TEMP\vs_stdout.log" -RedirectStandardError "$env:TEMP\vs_stderr.log"

          Write-Host "Exit code: $($process.ExitCode)"
          Get-Content "$env:TEMP\vs_stdout.log" -ErrorAction SilentlyContinue | Write-Host
          Get-Content "$env:TEMP\vs_stderr.log" -ErrorAction SilentlyContinue | Write-Host

          if ($process.ExitCode -ne 0) { Write-Error "Layout failed with code $($process.ExitCode)"; exit $process.ExitCode }

          Write-Host "Layout created at $layoutDir"
          "layout-created=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Test offline installation (verify layout)
        if: inputs.verify_layout == true && (steps.cache-restore.outputs.cache-hit == 'true' || steps.layout.outputs.layout-created == 'true')
        shell: pwsh
        timeout-minutes: 60
        run: |
          $layoutDir = "${{ steps.select-drive.outputs.layout_root }}"
          Write-Host "Testing offline installation from $layoutDir..."
          
          # Create a test directory for the installation
          $testInstallDir = "D:\vs_test_install"
          if (Test-Path $testInstallDir) {
            Remove-Item -Recurse -Force $testInstallDir
          }
          New-Item -ItemType Directory -Force -Path $testInstallDir | Out-Null
          
          # Build the test installation arguments
          $testArgs = @('--installPath', $testInstallDir, '--noWeb', '--noUpdateInstaller', '--quiet', '--wait', '--norestart')
          
          # Add the same workloads and layout options as used during layout creation
          $addArgs = @()
          if ('${{ inputs.workload_web }}' -eq 'true') { $addArgs += '--add'; $addArgs += 'Microsoft.VisualStudio.Workload.NetWeb' }
          if ('${{ inputs.workload_azure }}' -eq 'true') { $addArgs += '--add'; $addArgs += 'Microsoft.VisualStudio.Workload.Azure' }
          if ('${{ inputs.workload_python }}' -eq 'true') { $addArgs += '--add'; $addArgs += 'Microsoft.VisualStudio.Workload.Python' }
          if ('${{ inputs.workload_node }}' -eq 'true') { $addArgs += '--add'; $addArgs += 'Microsoft.VisualStudio.Workload.Node' }
          if ('${{ inputs.workload_maui }}' -eq 'true') { $addArgs += '--add'; $addArgs += 'Microsoft.VisualStudio.Workload.NetCrossPlat' }
          if ('${{ inputs.workload_desktop_net }}' -eq 'true') { $addArgs += '--add'; $addArgs += 'Microsoft.VisualStudio.Workload.ManagedDesktop' }
          if ('${{ inputs.workload_desktop_cpp }}' -eq 'true') { $addArgs += '--add'; $addArgs += 'Microsoft.VisualStudio.Workload.NativeDesktop' }
          if ('${{ inputs.workload_winui }}' -eq 'true') { $addArgs += '--add'; $addArgs += 'Microsoft.VisualStudio.Workload.Universal' }
          if ('${{ inputs.workload_cpp_mobile }}' -eq 'true') { $addArgs += '--add'; $addArgs += 'Microsoft.VisualStudio.Workload.NativeMobile' }
          if ('${{ inputs.workload_unity }}' -eq 'true') { $addArgs += '--add'; $addArgs += 'Microsoft.VisualStudio.Workload.ManagedGame' }
          if ('${{ inputs.workload_cpp_game }}' -eq 'true') { $addArgs += '--add'; $addArgs += 'Microsoft.VisualStudio.Workload.NativeGame' }
          if ('${{ inputs.workload_data }}' -eq 'true') { $addArgs += '--add'; $addArgs += 'Microsoft.VisualStudio.Workload.Data' }
          if ('${{ inputs.workload_data_science }}' -eq 'true') { $addArgs += '--add'; $addArgs += 'Microsoft.VisualStudio.Workload.DataScience' }
          if ('${{ inputs.workload_office }}' -eq 'true') { $addArgs += '--add'; $addArgs += 'Microsoft.VisualStudio.Workload.Office' }
          if ('${{ inputs.workload_vs_extension }}' -eq 'true') { $addArgs += '--add'; $addArgs += 'Microsoft.VisualStudio.Workload.VisualStudioExtension' }
          if ('${{ inputs.workload_linux_cpp }}' -eq 'true') { $addArgs += '--add'; $addArgs += 'Microsoft.VisualStudio.Workload.NativeCrossPlat' }
          
          $testArgs += $addArgs
          
          $layoutOptions = "${{ inputs.layout_options }}".Trim()
          if ($layoutOptions -ne '') {
            $testArgs += $layoutOptions -split ' '
          }
          
          Write-Host "Test arguments: $testArgs"
          
          # Run the installer from the layout directory
          $layoutExe = Join-Path $layoutDir "vs_community.exe"
          $process = Start-Process -FilePath $layoutExe -ArgumentList $testArgs -PassThru -Wait -NoNewWindow `
            -RedirectStandardOutput "$env:TEMP\vs_test_stdout.log" -RedirectStandardError "$env:TEMP\vs_test_stderr.log"
          
          Write-Host "Test installation exit code: $($process.ExitCode)"
          Get-Content "$env:TEMP\vs_test_stdout.log" -ErrorAction SilentlyContinue | Write-Host
          Get-Content "$env:TEMP\vs_test_stderr.log" -ErrorAction SilentlyContinue | Write-Host
          
          if ($process.ExitCode -ne 0) {
            Write-Error "Offline installation test FAILED! The layout is missing required components."
            exit 1
          }
          
          Write-Host "Offline installation test PASSED - layout is complete and working."
          
          # Clean up test installation
          if (Test-Path $testInstallDir) {
            Write-Host "Cleaning up test installation..."
            Remove-Item -Recurse -Force $testInstallDir -ErrorAction SilentlyContinue
          }

      - name: Package layout into zip
        if: steps.cache-restore.outputs.cache-hit == 'true' || steps.layout.outputs.layout-created == 'true'
        shell: powershell
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = "$env:RUNNER_TEMP\VsCommunity2026Layout.zip"
          [System.IO.Compression.ZipFile]::CreateFromDirectory("${{ steps.select-drive.outputs.layout_root }}", $zip, 'Optimal', $false)
          Write-Host "Zip size: $((Get-Item $zip).Length / 1MB) MB"
          echo "ZIP_PATH=$zip" >> $env:GITHUB_ENV

      - name: Split zip and upload chunks (with smart reassemble.bat)
        if: steps.cache-restore.outputs.cache-hit == 'true' || steps.layout.outputs.layout-created == 'true'
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $zip = $env:ZIP_PATH
          if (-not $zip) { $zip = "$env:RUNNER_TEMP\VsCommunity2026Layout.zip" }
          $chunks = "vs_2026_community_offline"
          New-Item -ItemType Directory -Force -Path $chunks | Out-Null
          $stream = [System.IO.File]::OpenRead($zip)
          $buffer = New-Object byte[] (20 * 1MB)
          $idx = 0
          while (($n = $stream.Read($buffer, 0, $buffer.Length)) -gt 0) {
            [System.IO.File]::WriteAllBytes("$chunks\VsCommunity2026Layout.part{0:D4}" -f $idx, $buffer[0..($n-1)])
            $idx++
          }
          $stream.Close()
          $totalChunks = $idx
          Write-Host "Total chunks to upload: $totalChunks"

          # --- IMPROVED reassemble.bat: deletes parts on success ---
          $batContent = @"
          @echo off
          setlocal enabledelayedexpansion
          echo ========================================
          echo  Reassembling Visual Studio Layout...
          echo ========================================
          echo.
          echo Combining VsCommunity2026Layout.part* into VsCommunity2026Layout.zip...
          copy /b VsCommunity2026Layout.part* VsCommunity2026Layout.zip
          if %errorlevel% equ 0 (
              echo.
              echo Successfully created VsCommunity2026Layout.zip
              echo.
              echo Deleting temporary parts...
              del VsCommunity2026Layout.part*
              echo Done! You can now extract VsCommunity2026Layout.zip and run vs_setup.exe
          ) else (
              echo.
              echo ERROR: Failed to reassemble the ZIP file.
              echo All parts are kept intact so you can retry.
          )
          echo.
          echo ========================================
          pause
          "@
          $batContent | Out-File "$chunks\reassemble.bat" -Encoding ASCII
          # ---------------------------------------------------

          $token = $env:GITHUB_TOKEN
          $repo = $env:GITHUB_REPOSITORY
          $branch = $env:GITHUB_REF_NAME
          $base = "https://api.github.com/repos/$repo/contents"
          $headers = @{ Authorization = "Bearer $token" }
          $maxRetries = 3
          for ($i=0; $i -lt $totalChunks; $i++) {
            $f = "$chunks\VsCommunity2026Layout.part{0:D4}" -f $i
            $bytes = [System.IO.File]::ReadAllBytes($f)
            $enc = [Convert]::ToBase64String($bytes)
            $url = "$base/$($f -replace '\\','/')"
            $sha = try { (Invoke-RestMethod $url -Headers $headers -ErrorAction SilentlyContinue).sha } catch { $null }
            $body = @{message="Upload $([System.IO.Path]::GetFileName($f))"; content=$enc; branch=$branch}
            if ($sha) { $body.sha = $sha }
            $success = $false
            for ($retry=0; $retry -lt $maxRetries; $retry++) {
              try {
                Invoke-RestMethod $url -Method Put -Headers $headers -Body ($body | ConvertTo-Json -Compress) -ContentType "application/json"
                Write-Host "[OK] Uploaded chunk $($i+1) of $totalChunks"
                $success = $true
                break
              } catch {
                if ($retry -lt $maxRetries-1) {
                  Write-Host "Retry $($retry+1) in 10 seconds..."
                  Start-Sleep -Seconds 10
                } else {
                  Write-Error "Failed to upload chunk $f after $maxRetries attempts"
                  exit 1
                }
              }
            }
            if (-not $success) { exit 1 }
            Start-Sleep -Milliseconds 500
          }
          # Upload the improved reassemble.bat
          $batPath = "$chunks\reassemble.bat"
          $bytes = [System.IO.File]::ReadAllBytes($batPath)
          $enc = [Convert]::ToBase64String($bytes)
          $url = "$base/$chunks/reassemble.bat"
          $sha = try { (Invoke-RestMethod $url -Headers $headers -ErrorAction SilentlyContinue).sha } catch { $null }
          $body = @{message="Upload reassemble.bat"; content=$enc; branch=$branch}
          if ($sha) { $body.sha = $sha }
          Invoke-RestMethod $url -Method Put -Headers $headers -Body ($body | ConvertTo-Json -Compress) -ContentType "application/json"
          Write-Host "All chunks plus reassemble.bat uploaded successfully to folder: $chunks"

      - name: Save layout cache
        if: inputs.cache_mode == 'use cache if any' && steps.layout.outputs.layout-created == 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ steps.select-drive.outputs.layout_root }}
          key: ${{ steps.cache-key.outputs.key }}
